name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ponytail: prerender runs route loaders against local miniflare D1,
      # which starts empty. Apply migrations to the local sqlite so the
      # landing query (count of verified professionals) doesn't 500.
      - run: npx wrangler d1 migrations apply psico-support-db --local

      # ponytail: CLOUDFLARE_VITE_FORCE_LOCAL makes the @cloudflare/vite-plugin
      # prerender the PWA shell against local miniflare instead of starting a
      # remote edge-preview proxy session (which needs an extra API scope not
      # in the standard Workers token template). The shell is static HTML;
      # remote bindings (email) only matter at runtime, not build time.
      - run: npm run build
        env:
          CLOUDFLARE_VITE_FORCE_LOCAL: "true"

      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ponytail: deploy ships code only; D1 migrations are a separate
      # manual step (AGENTS.md gotcha #1). Run them here so prod never
      # drifts. List --remote after as the sanity check.
      - run: npx wrangler d1 migrations apply psico-support-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - run: npx wrangler d1 migrations list psico-support-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}